<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Shopify</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
        }

        .welcome-text {
            color: rgb(239, 236, 236);
            max-width: 450px;
        }
    
        .register-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="welcome-text">
    <h1 class="display-3 fw-bold">Welcome to Shopify</h1>
    <p class="lead">Buy & Sell here with the best tools.</p>
</div>    

<div class="register-box">
    <h2 class="text-center mb-4">Create Account</h2>
    <form>
        
        <div class="mb-3">
            <label class="form-label fw-bold">Full Name</label>
            <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" class="form-control" placeholder="Enter your full name" required>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" placeholder="Enter password" required>
            </div>
        </div>
       
        <div class="mb-3">
            <label class="form-label fw-bold">Confirm Password</label>
            <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" placeholder="Confirm password" required>
            </div>
        </div>


        <button type="submit" class="btn btn-dark w-100 py-2 mt-2">REGISTER</button>
    </form>

    <div class="text-center mt-3">
        <p class="fw-bold text-muted small">Or Register With</p>
        <div class="d-flex justify-content-center gap-3">
            <a href="#" class="btn btn-outline-danger btn-sm rounded-circle"><i class="fa-brands fa-google"></i></a>
            <a href="#" class="btn btn-outline-dark btn-sm rounded-circle"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="btn btn-outline-primary btn-sm rounded-circle"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
